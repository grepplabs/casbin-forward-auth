name: Verify Code

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - uses: azure/setup-helm@v5
        with:
          version: 'v3.20.2'

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
          version: v0.31.0

      - name: Verify kind installation
        run: kind version

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Test
        run: make test

      - name: Test E2E
        run: make test-e2e
